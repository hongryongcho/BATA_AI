<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BATAGOTA Services</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e1117;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #ffffff;
    }

    .header p {
      margin-top: 0.6rem;
      color: #888;
      font-size: 0.95rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #1f77b4;
      margin: 1.2rem auto 0;
      border-radius: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.4rem;
      width: 100%;
      max-width: 780px;
    }

    .card {
      background: #1a1e2e;
      border: 1px solid #2a2e3e;
      border-radius: 14px;
      padding: 1.8rem 1.6rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .card:hover {
      border-color: #1f77b4;
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(31, 119, 180, 0.18);
    }

    .card-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 600;
      color: #ffffff;
    }

    .card-desc {
      font-size: 0.88rem;
      color: #9aa0b0;
      line-height: 1.6;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      background: #252a3a;
      color: #7a8aaa;
      margin-top: 0.3rem;
      align-self: flex-start;
    }

    .card-arrow {
      margin-top: auto;
      padding-top: 0.8rem;
      font-size: 0.82rem;
      color: #1f77b4;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .footer {
      margin-top: 3.5rem;
      text-align: center;
      color: #444;
      font-size: 0.8rem;
    }

    @media (max-width: 480px) {
      .header h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>BATAGOTA</h1>
    <p>서비스 포털</p>
    <div class="divider"></div>
  </div>

  <div class="grid">

    <a class="card" href="https://stock.batagota.com" target="_blank">
      <div class="card-icon">📈</div>
      <div class="card-title">FnG RSI(2) 투자 대시보드</div>
      <div class="card-desc">
        TQQQ / SOXL 매매 신호 (RSI(2) + Fear&amp;Greed + QQQ Guard)<br>
        백테스트 성과 분석 · 거래 내역 관리 · 투자 일지
      </div>
      <span class="card-tag">로그인 필요</span>
      <div class="card-arrow">stock.batagota.com &rarr;</div>
    </a>

    <a class="card" href="https://mqtt.batagota.com" target="_blank">
      <div class="card-icon">📡</div>
      <div class="card-title">BATAGOTA MQTT Dashboard</div>
      <div class="card-desc">
        IoT 실시간 데이터 모니터링<br>
        MQTT 메시지 로그 · 태블릿 UI
      </div>
      <span class="card-tag">내부 서비스</span>
      <div class="card-arrow">mqtt.batagota.com &rarr;</div>
    </a>

  </div>

  <div class="footer">
    &copy; 2026 BATAGOTA &nbsp;·&nbsp; M4 Mac mini
  </div>

</body>
</html>
